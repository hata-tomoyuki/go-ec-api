name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build check
        run: go build ./...

      - name: Run unit tests
        run: go test ./... -run 'Test[^I]' -timeout 60s -cover

      - name: Run integration tests
        run: go test ./... -run TestIntegration -v -timeout 120s
        # testcontainers は GitHub Actions の Docker を使うため追加設定不要
